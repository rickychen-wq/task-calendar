<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SYSTEM.CALENDAR // 核心終端</title>
  <style>
    /* --- 質感暗黑科技 CSS --- */
    body {
      background-color: #050505; 
      color: #00ffcc;
      font-family: 'Consolas', 'Courier New', monospace;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center; 
      min-height: 100vh;
      background-image: radial-gradient(circle at 50% 0%, #111e25 0%, #050505 80%);
    }

    /* 模擬手機外框 */
    .app-container {
      width: 100%;
      max-width: 400px; 
      height: 90vh; /* 佔滿大部分螢幕 */
      position: relative;
      background: rgba(0, 0, 0, 0.7);
      border: 1px solid rgba(0, 255, 204, 0.2); 
      border-radius: 20px; 
      box-shadow: 0 0 30px rgba(0, 255, 204, 0.05), inset 0 0 15px rgba(0, 255, 204, 0.05); 
      overflow: hidden; 
      display: flex;
      flex-direction: column;
    }

    /* 內容滾動區 (避開底部按鈕) */
    .content-area {
      flex: 1;
      overflow-y: auto;
      padding: 25px;
      padding-bottom: 90px; 
    }

    /* 隱藏區塊 */
    .hidden { display: none !important; }

    /* 標題 */
    h2, h3, h4 { 
      text-transform: uppercase; 
      letter-spacing: 2px; 
      text-shadow: 0 0 8px rgba(0, 255, 204, 0.3); 
      margin-top: 0; 
    }

    /* 輸入框 */
    .input-box {
      background: rgba(0, 255, 204, 0.03);
      border: 1px solid rgba(0, 255, 204, 0.3);
      color: #fff; padding: 15px; width: 100%; box-sizing: border-box; margin-bottom: 15px; border-radius: 8px; outline: none; font-family: 'Consolas', monospace; font-size: 16px;
    }
    .input-box:focus { border-color: #00ffcc; background: rgba(0, 255, 204, 0.08); }

    /* 按鈕 */
    .btn-primary {
      background: rgba(0, 255, 204, 0.1); color: #00ffcc; border: 1px solid #00ffcc; padding: 15px; width: 100%; cursor: pointer; text-transform: uppercase; font-weight: bold; letter-spacing: 2px; border-radius: 8px; margin-bottom: 10px; transition: 0.3s; font-size: 16px;
    }
    .btn-primary:hover, .btn-primary:active { background: #00ffcc; color: #000; }

    /* 任務卡片 */
    .task-card {
      background: rgba(255, 255, 255, 0.02); border-left: 4px solid #00ffcc; padding: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border-radius: 0 8px 8px 0;
    }
    .task-card.overdue { border-left-color: #ff0055; background: rgba(255, 0, 85, 0.05); }
    .task-card.overdue strong { color: #ff0055; text-shadow: 0 0 5px rgba(255, 0, 85, 0.4); }
    .btn-done { background: transparent; color: #fff; border: 1px solid #555; padding: 8px 15px; cursor: pointer; border-radius: 6px; }

    /* --- 底部導航列 --- */
    .bottom-nav {
      position: absolute; bottom: 0; left: 0; width: 100%;
      background: rgba(5, 5, 5, 0.95);
      border-top: 1px solid rgba(0, 255, 204, 0.2);
      display: flex; justify-content: space-around; padding: 15px 0;
      backdrop-filter: blur(10px);
    }
    .nav-btn {
      background: transparent; border: none; color: #555; font-size: 16px; font-family: 'Consolas', monospace; cursor: pointer; padding: 10px 20px; transition: color 0.3s;
    }
    .nav-btn.active { color: #00ffcc; text-shadow: 0 0 8px rgba(0, 255, 204, 0.5); font-weight: bold; }
  </style>
</head>
<body>

  <div class="app-container">
    
    <div class="content-area">
      <div id="login-view">
        <h2 style="text-align: center; margin-top: 40px; margin-bottom: 30px;">SYS.LOGIN</h2>
        <div id="auth-form">
          <input type="text" id="userId" placeholder="輸入專屬 ID" class="input-box">
          <input type="password" id="password" placeholder="輸入密碼" class="input-box">
          <button id="login-btn" class="btn-primary">登入系統</button>
        </div>
        <div id="register-form" class="hidden">
          <p style="color: #ff0055; text-align: center; font-size: 14px; margin-bottom: 20px;">[ 查無憑證，請綁定身分 ]</p>
          <input type="text" id="userName" placeholder="輸入終端代號 (名字)" class="input-box">
          <button id="register-btn" class="btn-primary">確認綁定並登入</button>
        </div>
      </div>

      <div id="main-view" class="hidden">
        <h3 id="welcome-text" style="border-bottom: 1px solid rgba(0,255,204,0.3); padding-bottom: 10px; margin-bottom: 20px;">歡迎</h3>
        
        <div id="overdue-container" class="hidden" style="margin-bottom: 30px;">
          <h4 style="color: #ff0055; border-bottom: 1px solid rgba(255,0,85,0.3); padding-bottom: 5px;">🚨 超時警告</h4>
          <div id="overdue-list"></div>
        </div>
        
        <div id="upcoming-container">
          <h4 style="color: #00ffcc; border-bottom: 1px solid rgba(0,255,204,0.3); padding-bottom: 5px;">📅 排程任務</h4>
          <div id="upcoming-list"></div>
        </div>
      </div>

      <div id="add-view" class="hidden">
        <h3 style="margin-bottom: 25px; color: #00ffcc;">[ 寫入新排程 ]</h3>
        <input type="text" id="taskTitle" placeholder="任務名稱 (要做什麼？)" class="input-box">
        <input type="date" id="taskDate" class="input-box">
        <input type="time" id="taskTime" class="input-box">
        <button id="submit-task-btn" class="btn-primary" style="margin-top: 20px;">確認寫入</button>
      </div>
    </div>

    <div id="bottom-nav-bar" class="bottom-nav hidden">
      <button id="nav-tasks-btn" class="nav-btn active">列表</button>
      <button id="nav-add-btn" class="nav-btn">新增</button>
      <button id="logout-btn" class="nav-btn" style="color: #ff0055;">登出</button>
    </div>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, collection, addDoc, getDocs, query, where, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // 你的 Firebase 金鑰
    const firebaseConfig = {
      apiKey: "AIzaSyBszEuwV3W367ko03aj82hBF__I8kLjaDA",
      authDomain: "task-calendar-e96b6.firebaseapp.com",
      projectId: "task-calendar-e96b6",
      storageBucket: "task-calendar-e96b6.firebasestorage.app",
      messagingSenderId: "174274927666",
      appId: "1:174274927666:web:5e39b5f19312c0a151b02b",
      measurementId: "G-DY2T3F5W4N"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentUserId = "";
    let currentUserName = "";

    // 抓取畫面元素
    const loginView = document.getElementById('login-view');
    const authForm = document.getElementById('auth-form');
    const registerForm = document.getElementById('register-form');
    const mainView = document.getElementById('main-view');
    const addView = document.getElementById('add-view');
    const bottomNavBar = document.getElementById('bottom-nav-bar');
    
    const overdueContainer = document.getElementById('overdue-container');
    const overdueList = document.getElementById('overdue-list');
    const upcomingList = document.getElementById('upcoming-list');

    const navTasksBtn = document.getElementById('nav-tasks-btn');
    const navAddBtn = document.getElementById('nav-add-btn');

    // --- 1. 登入 ---
    document.getElementById('login-btn').addEventListener('click', async () => {
      const idInput = document.getElementById('userId').value;
      const pwdInput = document.getElementById('password').value;
      if (!idInput || !pwdInput) return alert("系統提示：請輸入憑證");

      try {
        const userSnap = await getDoc(doc(db, "users", idInput));
        if (userSnap.exists() && userSnap.data().password === pwdInput) {
          currentUserId = userSnap.data().id;
          currentUserName = userSnap.data().name;
          showMainView();
        } else if (!userSnap.exists()) {
          authForm.classList.add('hidden');
          registerForm.classList.remove('hidden');
        } else {
          alert("密碼錯誤，拒絕存取");
        }
      } catch (e) {
        alert("資料庫連線異常");
      }
    });

    // --- 2. 註冊 ---
    document.getElementById('register-btn').addEventListener('click', async () => {
      const idInput = document.getElementById('userId').value;
      const pwdInput = document.getElementById('password').value;
      const nameInput = document.getElementById('userName').value;
      if (!nameInput) return alert("請輸入終端代號！");

      await setDoc(doc(db, "users", idInput), { id: idInput, password: pwdInput, name: nameInput });
      currentUserId = idInput;
      currentUserName = nameInput;
      showMainView();
    });

    // --- 3. 畫面切換控制 ---
    function showMainView() {
      loginView.classList.add('hidden');
      mainView.classList.remove('hidden');
      addView.classList.add('hidden');
      bottomNavBar.classList.remove('hidden');
      
      navTasksBtn.classList.add('active');
      navAddBtn.classList.remove('active');
      
      document.getElementById('welcome-text').innerText = `${currentUserName} 的終端`;
      fetchTasks();
    }

    navTasksBtn.addEventListener('click', () => {
      mainView.classList.remove('hidden');
      addView.classList.add('hidden');
      navTasksBtn.classList.add('active');
      navAddBtn.classList.remove('active');
      fetchTasks();
    });

    navAddBtn.addEventListener('click', () => {
      mainView.classList.add('hidden');
      addView.classList.remove('hidden');
      navTasksBtn.classList.remove('active');
      navAddBtn.classList.add('active');
    });

    document.getElementById('logout-btn').addEventListener('click', () => {
      currentUserId = ""; currentUserName = "";
      document.getElementById('userId').value = ""; document.getElementById('password').value = "";
      authForm.classList.remove('hidden'); registerForm.classList.add('hidden');
      mainView.classList.add('hidden'); addView.classList.add('hidden');
      bottomNavBar.classList.add('hidden'); loginView.classList.remove('hidden');
    });

    // --- 4. 新增任務 ---
    document.getElementById('submit-task-btn').addEventListener('click', async () => {
      const title = document.getElementById('taskTitle').value;
      const date = document.getElementById('taskDate').value;
      const time = document.getElementById('taskTime').value;

      if (!title || !date || !time) return alert("資料不全，無法登錄排程。");

      await addDoc(collection(db, "tasks"), { userId: currentUserId, title, date, time, createdAt: new Date().getTime() });

      document.getElementById('taskTitle').value = ""; document.getElementById('taskDate').value = ""; document.getElementById('taskTime').value = "";
      
      // 自動切回列表
      navTasksBtn.click();
    });

    // --- 5. 抓取與渲染任務 ---
    async function fetchTasks() {
      const q = query(collection(db, "tasks"), where("userId", "==", currentUserId));
      const querySnapshot = await getDocs(q);
      const tasks = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

      const now = new Date();
      let overdue = [], upcoming = [];

      tasks.forEach(task => {
        const taskDateTime = new Date(`${task.date}T${task.time}`);
        (taskDateTime < now) ? overdue.push({ ...task, dateObj: taskDateTime }) : upcoming.push({ ...task, dateObj: taskDateTime });
      });

      overdue.sort((a, b) => a.dateObj - b.dateObj);
      upcoming.sort((a, b) => a.dateObj - b.dateObj);

      renderTasks(overdue, upcoming);
    }

    function renderTasks(overdue, upcoming) {
      overdueList.innerHTML = ""; upcomingList.innerHTML = "";

      if (overdue.length > 0) {
        overdueContainer.classList.remove('hidden');
        overdue.forEach(task => {
          overdueList.innerHTML += `
            <div class="task-card overdue">
              <div><strong style="font-size: 18px; display: block;">${task.title}</strong><span style="font-size: 14px;">${task.date} ${task.time}</span></div>
              <button class="btn-done" onclick="window.completeTask('${task.id}')">完成</button>
            </div>`;
        });
      } else overdueContainer.classList.add('hidden');

      if (upcoming.length === 0) upcomingList.innerHTML = `<p style="color: #777; text-align: center;">無待辦排程。</p>`;
      else {
        upcoming.forEach(task => {
          upcomingList.innerHTML += `
            <div class="task-card">
              <div><strong style="font-size: 18px; display: block;">${task.title}</strong><span style="font-size: 14px; color: #888;">${task.date} ${task.time}</span></div>
              <button class="btn-done" onclick="window.completeTask('${task.id}')">完成</button>
            </div>`;
        });
      }
    }

    // 全域完成任務功能
    window.completeTask = async function(taskId) {
      await deleteDoc(doc(db, "tasks", taskId));
      fetchTasks();
    };

  </script>
</body>
</html>
